name: Docker Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: calendar-booking:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Start container
          docker run -d --name test-app -p 3000:80 calendar-booking:latest
          
          # Wait for startup
          sleep 30
          
          # Test endpoints
          curl -f http://localhost:3000/api/owner || exit 1
          curl -f http://localhost:3000/api/event-types || exit 1
          
          # Stop container
          docker stop test-app
          docker rm test-app
